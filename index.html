<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocify</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- RESPONSIVE CONTAINER: Changed px-28 to px-4 sm:px-6 md:px-12 lg:px-28 for mobile-first responsive padding -->
    <div class=" container bg-[url('images/image.png')] bg-black min-h-screen bg-center bg-cover px-4 sm:px-6 md:px-12 lg:px-28 py-3 sm:py-5 relative">
        <!-- RESPONSIVE NAVIGATION: Mobile stacks vertically flex-col, sm+ shows horizontally with proper spacing -->
        <nav class="flex flex-col sm:flex-row items-center justify-between gap-4 sm:gap-2 w-full">
            <!-- RESPONSIVE LOGO: Changed w-40 to w-24 sm:w-32 md:w-40 for smaller mobile size -->
            <img src="images/logo.png" alt="" class="w-24 sm:w-32 md:w-40 cursor-pointer">
            <!-- RESPONSIVE MENU: Mobile wraps items, sm+ displays inline with proper text sizing -->
            <ul class="flex flex-wrap justify-center gap-1 sm:gap-0 flex-1 sm:flex-none">
                <li class="list-none px-1 sm:px-3 md:px-5"><a href="#" class="no-underline hover:text-yellow-400 text-white px-1 sm:px-2 duration-300 text-xs sm:text-sm md:text-base whitespace-nowrap">Home</a></li>
                <li class="list-none px-1 sm:px-3 md:px-5"><a href="#" class="no-underline hover:text-yellow-400 text-white px-1 sm:px-2 duration-300 text-xs sm:text-sm md:text-base whitespace-nowrap">About</a></li>
                <li class="list-none px-1 sm:px-3 md:px-5"><a href="#" class="no-underline hover:text-yellow-400 text-white px-1 sm:px-2 duration-300 text-xs sm:text-sm md:text-base whitespace-nowrap">Features</a></li>
                <li class="list-none px-1 sm:px-3 md:px-5"><a href="#" class="no-underline hover:text-yellow-400 text-white px-1 sm:px-2 duration-300 text-xs sm:text-sm md:text-base whitespace-nowrap">Contact</a></li>
            </ul>

            <img src="images/cart.png" alt="" class="w-6 sm:w-8 cursor-pointer">

        </nav>

        <!-- RESPONSIVE HERO CONTENT: Adjusted mt-20 sm:mt-32, text-4xl sm:text-5xl md:text-6xl, added max-w-full sm:max-w-xl -->
        <div class="text-white mt-20 sm:mt-32 max-w-full sm:max-w-xl">
            <!-- RESPONSIVE HEADING: Changed text-6xl to text-4xl sm:text-5xl md:text-6xl for mobile sizing -->
            <h1 class="text-4xl sm:text-5xl md:text-6xl font-semibold leading-normal">Groceries<br>delivery in <span class="font-light">15 mins.</span></h1>
            <!-- RESPONSIVE PARAGRAPH: Added text-sm sm:text-base for mobile text sizing -->
            <p class="text-sm sm:text-base mt-3 sm:mt-4">Grocify offers a wide range of products, including fresh products, meats, dairy, baked items and non-perishable items.</p>
            <!-- RESPONSIVE BUTTON SECTION: Changed flex-col sm:flex-row gap and added flex-wrap for mobile buttons -->
            <div class="mt-6 sm:mt-10 flex flex-col sm:flex-row gap-3 sm:gap-4">
                <a href="#" class="bg-yellow-400 rounded-3xl py-2 sm:py-3 px-6 sm:px-8 font-medium inline-block hover:bg-transparent hover:border-yellow-300 hover:text-white duration-300 hover:border border-transparent border text-white text-center text-sm sm:text-base">Order Now</a>
                <a href="#" class="hover:border-transparent hover:bg-yellow-400 py-2 sm:py-3 px-6 sm:px-8 rounded-3xl border border-yellow-300 duration-300 font-medium text-center text-sm sm:text-base">Download App <span class="text-lg inline-block">&#10148;</span></a>
            </div>
        </div>

        <!-- RESPONSIVE IMAGE: Changed w-full xl:w-[36rem] to w-full md:w-96 lg:w-[36rem], adjusted positioning for mobile -->
        <img class="w-full md:w-96 lg:w-[36rem] lg:absolute bottom-0 right-0 duration-300 mt-6 sm:mt-10" src="images/grocery-image.png" alt="">

    </div>
</body>
</html>
