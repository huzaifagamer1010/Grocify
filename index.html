<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocify</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class=" container bg-[url('images/image.png')] min-h-screen bg-center bg-cover px-28 py-5 relative">
        <nav class="flex items-center ">
            <img src="images/logo.png" alt="" class="w-40 cursor-pointer">
            <ul class="flex-1 text-center">
                <li class="list-none inline-block px-5"><a href="#" class="no-underline hover:text-yellow-400 text-white px-2 duration-300">Home</a></li>
                <li class="list-none inline-block px-5"><a href="#" class="no-underline hover:text-yellow-400 text-white px-2 duration-300">About</a></li>
                <li class="list-none inline-block px-5"><a href="#" class="no-underline hover:text-yellow-400 text-white px-2 duration-300">Features</a></li>
                <li class="list-none inline-block px-5"><a href="#" class="no-underline hover:text-yellow-400 text-white px-2 duration-300">Contact</a></li>
            </ul>

            <img src="images/cart.png" alt="" class="w-8 cursor-pointer">

        </nav>

        <div class="text-white mt-32 max-w-xl">
            <h1 class="text-6xl font-semibold leading-normal">Groceries<br>delivery in <span class="font-light">15 mins.</span></h1>
            <p>Grocify offers a wide range of products, including fresh products, meats, dairy, baked items and non-perishable items.</p>
            <div class="mt-10">
                <a href="#" class="bg-yellow-400 rounded-3xl py-3 px-8 font-medium inline-block mr-4 hover:bg-transparent hover:border-yellow-300 hover:text-white duration-300 hover:border border-transparent border text-white">Order Now</a>
                <a href="#" class="hover:border-transparent hover:bg-yellow-400 py-3 px-8 rounded-3xl border border-yellow-300 duration-300 font-medium">Download App <span class="text-lg inline-block">&#10148;</span></a>
            </div>
        </div>

            
        <img class="w-full xl:w-1/2 xl:absolute bottom-0 right-0 duration-300" src="images/grocery-image.png" alt="">

    </div>
</body>
</html>
